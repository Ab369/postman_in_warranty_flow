name: In warranty flow

on:
  push:
    branches: [main]
  workflow_dispatch:
  # schedule:
  #   - cron: 30 1 * * * #7 am IST
  #   - cron: 30 14 * * *  #8pm IST

jobs:
  run-tests:
    runs-on: AwsRunner
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2
  
      - name: setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
  
      - name: setup newman and htmlextra
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
  
      - name: run collection
        run: |
          newman run 'in-warranty-flow.postman_collection.json' \
          -e QA.postman_environment.json \
          -d testData.csv \
          -r cli,htmlextra \
          --reporter-htmlextra-export ./newman/index.html

      - name: upload report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: newman-html-report
          path: newman/*.html

      - name: github pages action
        if: always()
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name: send email notification
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com 
          server_port: 465
          username: ${{ secrets.username }}
          password: ${{ secrets.password }}
          subject: phoneix in warranty flow report
          to: ompbabhinav2@gmail.com
          from: ${{ secrets.username }}
          body: Hi, Below is the api flow test report attached
          attachments: newman/index.html
          
        








          
          
          
      
    
      
    
